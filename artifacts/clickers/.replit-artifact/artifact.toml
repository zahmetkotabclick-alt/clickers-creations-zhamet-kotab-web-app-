kind = "web"
previewPath = "/"
title = "Clickers - Premium Storytelling Platform"
version = "1.0.0"
id = "artifacts/clickers"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24788

[services.development]
run = "pnpm --filter @workspace/clickers run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clickers", "run", "build" ]
publicDir = "artifacts/clickers/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24788"
BASE_PATH = "/"
